<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Tina 💖</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(180deg, #ffdde1, #ee9ca7);
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .mensaje {
      position: absolute;
      z-index: 10;
      text-align: center;
      animation: aparecer 2s ease-in-out infinite alternate;
    }

    .mensaje h1 {
      color: white;
      font-size: 4rem;
      text-shadow: 0 0 15px rgba(255,255,255,0.8);
      padding: 20px;
    }

    @keyframes aparecer {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.1);
      }
    }

    .flor {
      position: absolute;
      font-size: 35px;
      animation: caer linear infinite;
      user-select: none;
    }

    @keyframes caer {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .corazon {
      position: absolute;
      color: rgba(255,255,255,0.7);
      font-size: 20px;
      animation: subir 6s linear infinite;
    }

    @keyframes subir {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-20vh) scale(1.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="mensaje">
    <h1>💖 Te amo mucho mi Tina 💖</h1>
  </div>

  <script>
    const flores = ['🌸','🌺','🌷','🌹','💐','🌻'];

    function crearFlor() {
      const flor = document.createElement('div');
      flor.classList.add('flor');
      flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];

      flor.style.left = Math.random() * 100 + 'vw';
      flor.style.animationDuration = (3 + Math.random() * 5) + 's';
      flor.style.fontSize = (20 + Math.random() * 40) + 'px';

      document.body.appendChild(flor);

      setTimeout(() => {
        flor.remove();
      }, 8000);
    }

    function crearCorazon() {
      const corazon = document.createElement('div');
      corazon.classList.add('corazon');
      corazon.innerHTML = '❤';

      corazon.style.left = Math.random() * 100 + 'vw';
      corazon.style.animationDuration = (4 + Math.random() * 4) + 's';
      corazon.style.fontSize = (15 + Math.random() * 25) + 'px';

      document.body.appendChild(corazon);

      setTimeout(() => {
        corazon.remove();
      }, 8000);
    }

    setInterval(crearFlor, 250);
    setInterval(crearCorazon, 500);
  </script>

</body>
</html>
